<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Icône fixe (inchangée) -->
  <link rel="icon" type="image/jpeg" href="icone_site.jpeg">
  <link rel="apple-touch-icon" sizes="180x180" href="icone_site.jpeg">
  
  <title>Compte à rebours • intelligent</title>
  
  <style>
    /* ----- STYLE MODERNE (inspiré de la version précédente) ----- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0a0c0f;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      color: #eef2f5;
    }

    /* Grille animée plus douce et profonde */
    body::before {
      content: "";
      position: fixed;
      inset: -100% -100% -100% -100%;
      background-image: 
        linear-gradient(90deg, rgba(140, 210, 255, 0.02) 1px, transparent 1px),
        linear-gradient(0deg, rgba(140, 210, 255, 0.02) 1px, transparent 1px);
      background-size: 70px 70px;
      animation: drift 24s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-70px, -70px); }
    }

    /* Carte principale */
    .glass-card {
      position: relative;
      z-index: 10;
      width: 92%;
      max-width: 500px;
      background: rgba(18, 24, 32, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(220, 240, 255, 0.1);
      border-radius: 2.8rem;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 30px 60px -15px #000000, 0 0 0 1px rgba(70, 160, 255, 0.15) inset;
    }

    .time-remaining {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-align: center;
      color: #ffffff;
      text-shadow: 0 0 25px #2f80ff;
      line-height: 1.2;
      margin-bottom: 0.4rem;
      font-variant-numeric: tabular-nums;
    }

    .target-time {
      font-size: 1.2rem;
      text-align: center;
      color: #aac3d9;
      background: rgba(20, 30, 45, 0.6);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      display: inline-block;
      margin: 0 auto 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
    }

    /* Grille de boutons */
    .button-grid {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1.2rem 0 0.5rem;
    }

    .button-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      flex: 1 1 auto;
      min-width: 140px;
      padding: 0.9rem 0.8rem;
      border: none;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      background: rgba(30, 40, 55, 0.8);
      color: #e6f0ff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.15s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(45, 60, 85, 0.9);
      border-color: rgba(100, 180, 255, 0.4);
      transform: scale(0.97);
      box-shadow: 0 10px 20px rgba(0, 100, 255, 0.3);
    }

    .btn-primary {
      background: rgba(30, 110, 240, 0.9);
      color: white;
    }
    .btn-primary:hover {
      background: rgb(40, 130, 255);
    }

    .btn-success {
      background: rgba(20, 130, 80, 0.9);
    }
    .btn-success:hover {
      background: rgb(30, 160, 100);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
    }

    /* Zone API (titre + image) */
    .api-info {
      margin: 1.5rem 0 0.2rem;
      text-align: center;
      border-top: 1px dashed rgba(255,255,255,0.15);
      padding-top: 1.4rem;
    }

    .api-title {
      font-size: 1.3rem;
      font-weight: 500;
      color: #d0e2ff;
      margin-bottom: 0.8rem;
    }

    .api-image {
      max-width: 100%;
      max-height: 170px;
      width: auto;
      border-radius: 28px;
      box-shadow: 0 16px 30px -8px black;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.1);
      transition: opacity 0.2s;
    }

    /* Popup moderne */
    .popup-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, visibility 0s 0.25s;
    }

    .popup-overlay.show {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.25s ease, visibility 0s 0s;
    }

    .popup-card {
      background: #1f2937;
      padding: 2rem;
      border-radius: 2.8rem;
      width: 320px;
      max-width: 85vw;
      box-shadow: 0 40px 70px -10px black;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transform: scale(0.9);
      transition: transform 0.25s ease;
    }

    .popup-overlay.show .popup-card {
      transform: scale(1);
    }

    .popup-card input[type="time"] {
      background: #111a24;
      border: 1px solid #2e3b4b;
      color: white;
      font-size: 1.8rem;
      padding: 0.8rem;
      border-radius: 60px;
      text-align: center;
      font-weight: 500;
      outline: none;
    }

    .popup-card button {
      background: #2a80ff;
      border: none;
      color: white;
      font-weight: 700;
      padding: 1rem;
      border-radius: 60px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.1s ease;
    }
    .popup-card button:hover {
      background: #4090ff;
      transform: scale(0.97);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .glass-card { padding: 1.5rem; border-radius: 2rem; }
      .time-remaining { font-size: 3.2rem; }
      .btn { min-width: 120px; padding: 0.8rem 0.3rem; font-size: 0.85rem; }
      .target-time { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="time-remaining" id="timeRemaining">00:00:00</div>
    <div class="target-time" id="targetTime">CIBLE : --:--</div>

    <div class="button-grid">
      <div class="button-row">
        <button class="btn btn-primary" onclick="showTimePicker()">⏰ HEURE</button>
        <button class="btn btn-success" onclick="startCountdown()">▶ START</button>
      </div>
      <div class="button-row">
        <button class="btn btn-outline" onclick="resetCountdown()">⟲ RESET</button>
        <button class="btn btn-primary" onclick="loadAPI()">🌐 API</button>
      </div>
      <div class="button-row">
        <button class="btn btn-outline" onclick="switchMode()">🔄 SWITCH</button>
      </div>
    </div>

    <div class="api-info">
      <div class="api-title" id="apiTitle"></div>
      <img class="api-image" id="apiImage" src="" alt="" style="display: none;">
    </div>
  </div>

  <!-- Popup pour saisir l'heure -->
  <div class="popup-overlay" id="timePickerPopup">
    <div class="popup-card">
      <input type="time" id="timeInput" value="18:00">
      <button onclick="confirmTime()">Valider l’heure</button>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // -------------------- ÉTAT GLOBAL --------------------
      let countdownInterval = null;
      let targetDate = null;           // Date cible actuelle
      let usingAPI = false;             // Mode actif
      let apiData = null;               // Stocke { name, image } du dernier appel API

      // Clés localStorage
      const LS_MANUAL = 'targetDateManual';
      const LS_API = 'targetDateAPI';
      const LS_APIURL = 'apiUrl';
      const LS_APIDATA = 'apiData';     // pour sauvegarder name/image

      // Éléments DOM
      const elTime = document.getElementById('timeRemaining');
      const elTarget = document.getElementById('targetTime');
      const elApiTitle = document.getElementById('apiTitle');
      const elApiImage = document.getElementById('apiImage');
      const popup = document.getElementById('timePickerPopup');
      const timeInput = document.getElementById('timeInput');

      // -------------------- FONCTIONS D'AFFICHAGE --------------------
      function formatTwoDigits(n) {
        return n.toString().padStart(2, '0');
      }

      function updateDisplay() {
        if (!targetDate) {
          elTime.textContent = '00:00:00';
          return;
        }

        const now = new Date();
        let diff = targetDate - now;

        if (diff <= 0) {
          elTime.textContent = '00:00:00';
          clearInterval(countdownInterval);
          countdownInterval = null;
          // Ne pas supprimer targetDate, juste arrêter le compteur
          return;
        }

        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);

        elTime.textContent = `${formatTwoDigits(hours)}:${formatTwoDigits(minutes)}:${formatTwoDigits(seconds)}`;
      }

      // Met à jour la ligne cible et les infos API (titre/image)
      function updateTargetDisplay() {
        if (!targetDate) {
          elTarget.textContent = 'CIBLE : --:--';
          elApiTitle.textContent = '';
          elApiImage.style.display = 'none';
          elApiImage.src = '';
          return;
        }

        // Format lisible : jour/mois/année heures:minutes
        const options = { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' };
        const localStr = targetDate.toLocaleString('fr-FR', options).replace(':', 'h');
        elTarget.textContent = `CIBLE : ${localStr}`;

        // Métadonnées API
        if (usingAPI && apiData) {
          elApiTitle.textContent = apiData.name || '';
          if (apiData.image) {
            elApiImage.src = apiData.image;
            elApiImage.style.display = 'inline-block';
          } else {
            elApiImage.style.display = 'none';
            elApiImage.src = '';
          }
        } else {
          elApiTitle.textContent = '';
          elApiImage.style.display = 'none';
          elApiImage.src = '';
        }
      }

      // Nettoie l'intervalle
      function clearSafeInterval() {
        if (countdownInterval) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
      }

      // Lance le compte à rebours (si targetDate valide)
      function safeStartCountdown() {
        if (!targetDate) return false;
        clearSafeInterval();
        updateDisplay(); // affichage immédiat
        countdownInterval = setInterval(updateDisplay, 1000);
        return true;
      }

      // -------------------- ACTIONS MANUELLES --------------------
      window.showTimePicker = function() {
        popup.classList.add('show');
        timeInput.focus();
      };

      window.hideTimePicker = function() {
        popup.classList.remove('show');
      };

      window.confirmTime = function() {
        const timeVal = timeInput.value;
        if (!timeVal) return;

        const [hours, minutes] = timeVal.split(':').map(Number);
        const now = new Date();
        let candidate = new Date(now);
        candidate.setHours(hours, minutes, 0, 0);

        // Si l'heure est déjà passée aujourd'hui, on prend demain
        if (candidate <= now) {
          candidate.setDate(candidate.getDate() + 1);
        }

        targetDate = candidate;
        usingAPI = false;
        apiData = null;

        // Sauvegarde
        localStorage.setItem(LS_MANUAL, targetDate.toString());
        localStorage.removeItem(LS_API);
        localStorage.removeItem(LS_APIDATA);

        updateTargetDisplay();
        safeStartCountdown();
        hideTimePicker();
      };

      window.startCountdown = function() {
        if (!targetDate) {
          alert('Veuillez d’abord choisir une heure ou charger une API.');
          return;
        }
        safeStartCountdown();
      };

      window.resetCountdown = function() {
        clearSafeInterval();
        targetDate = null;
        usingAPI = false;
        apiData = null;

        elTime.textContent = '00:00:00';
        elTarget.textContent = 'CIBLE : --:--';
        elApiTitle.textContent = '';
        elApiImage.style.display = 'none';
        elApiImage.src = '';

        localStorage.removeItem(LS_MANUAL);
        localStorage.removeItem(LS_API);
        localStorage.removeItem(LS_APIURL);
        localStorage.removeItem(LS_APIDATA);

        hideTimePicker();
      };

      // -------------------- SWITCH MANUEL / API --------------------
      window.switchMode = function() {
        const manualRaw = localStorage.getItem(LS_MANUAL);
        const apiRaw = localStorage.getItem(LS_API);
        const apiDataRaw = localStorage.getItem(LS_APIDATA);

        if (usingAPI) {
          // Actuellement API → basculer vers manuel si disponible
          if (manualRaw) {
            targetDate = new Date(manualRaw);
            usingAPI = false;
            apiData = null;
            localStorage.removeItem(LS_APIDATA);
          } else {
            alert('Aucune date manuelle enregistrée. Choisissez une heure d’abord.');
            return;
          }
        } else {
          // Mode manuel → basculer vers API si disponible
          if (apiRaw) {
            targetDate = new Date(apiRaw);
            usingAPI = true;
            if (apiDataRaw) {
              try { apiData = JSON.parse(apiDataRaw); } catch { apiData = null; }
            } else {
              apiData = null;
            }
          } else {
            alert('Aucune date API enregistrée. Chargez une API d’abord.');
            return;
          }
        }

        updateTargetDisplay();
        safeStartCountdown();
      };

      // -------------------- CHARGEMENT API (ULTRA COMPATIBLE) --------------------
      window.loadAPI = async function() {
        const url = prompt('Entrez l’URL de l’API (JSON contenant une date) :', '');
        if (!url) return;

        try {
          let response;
          let useProxy = false;

          // Tentative de fetch direct
          try {
            response = await fetch(url);
            if (!response.ok) throw new Error('HTTP ' + response.status);
          } catch (e) {
            useProxy = true;
          }

          let data;
          if (useProxy) {
            // Fallback CORS via allorigins
            const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
            const proxyRes = await fetch(proxyUrl);
            const proxyJson = await proxyRes.json();
            data = JSON.parse(proxyJson.contents);
          } else {
            data = await response.json();
          }

          // Fonction récursive pour extraire toutes les dates potentielles (chaînes convertibles)
          let foundDates = [];

          function extractDates(obj) {
            if (!obj || typeof obj !== 'object') return;
            for (let key in obj) {
              let val = obj[key];
              // Si la valeur est une chaîne, on tente de la convertir en Date
              if (typeof val === 'string') {
                let d = new Date(val);
                if (!isNaN(d)) foundDates.push(d);
              }
              // Si la clé elle-même ressemble à une date (peu probable mais au cas où)
              if (typeof key === 'string') {
                let dk = new Date(key);
                if (!isNaN(dk)) foundDates.push(dk);
              }
              // Récursion dans les objets ou tableaux
              if (val && typeof val === 'object') {
                extractDates(val);
              }
            }
          }

          extractDates(data);

          if (foundDates.length === 0) {
            alert('Aucune date valide trouvée dans la réponse.');
            return;
          }

          // Filtrer les dates futures
          const now = new Date();
          let futureDates = foundDates.filter(d => d > now);
          if (futureDates.length === 0) {
            alert('Toutes les dates trouvées sont déjà passées.');
            return;
          }

          // Prendre la date future la plus proche
          futureDates.sort((a, b) => a - b);
          targetDate = futureDates[0];

          usingAPI = true;

          // Extraire les métadonnées (name, image) si présentes
          apiData = {
            name: data.name || null,
            image: data.image || null
          };

          // Sauvegarde
          localStorage.setItem(LS_API, targetDate.toString());
          localStorage.setItem(LS_APIURL, url);
          localStorage.setItem(LS_APIDATA, JSON.stringify(apiData));

          updateTargetDisplay();
          safeStartCountdown();

        } catch (err) {
          alert('Erreur lors du chargement de l’API. Voir console.');
          console.error(err);
        }
      };

      // -------------------- INITIALISATION AU CHARGEMENT --------------------
      window.addEventListener('load', function() {
        const manual = localStorage.getItem(LS_MANUAL);
        const api = localStorage.getItem(LS_API);
        const apiDataRaw = localStorage.getItem(LS_APIDATA);

        if (manual) {
          const d = new Date(manual);
          if (!isNaN(d)) {
            targetDate = d;
            usingAPI = false;
            apiData = null;
          }
        } else if (api) {
          const d = new Date(api);
          if (!isNaN(d)) {
            targetDate = d;
            usingAPI = true;
            if (apiDataRaw) {
              try { apiData = JSON.parse(apiDataRaw); } catch { apiData = null; }
            }
          }
        }

        if (targetDate) {
          updateTargetDisplay();
          safeStartCountdown();
        } else {
          elTime.textContent = '00:00:00';
          elTarget.textContent = 'CIBLE : --:--';
        }

        // Fermer le popup en cliquant sur l'overlay
        popup.addEventListener('click', function(e) {
          if (e.target === popup) hideTimePicker();
        });
      });

    })();
  </script>
</body>
</html>
